name: test

on:
  push:
    paths-ignore:
      - LICENSE
      - README.*
      - examples
      - editors
      - package.json
  pull_request:
    paths-ignore:
      - LICENSE
      - README.*
      - examples
      - editors
      - package.json

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        nim-version:
          - '2.0.0'
        os:
          - ubuntu-latest
          # - windows-latest
          # - macOS-latest
          # - macos-13 # building on arm64 fails
    steps:
      - uses: actions/checkout@v2
      - uses: jiro4989/setup-nim-action@v1
        with:
          nim-version: ${{ matrix.nim-version }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install libpcre and luajit
        run: sudo apt-get install -y libluajit-5.1-dev luajit libpcre3-dev

      - name: Install cmake-js for building node bindings"
        run: "npm install cmake-js -g"

      - run: "choosenim show path -y"

      - run: nimble install -Y
      - run: nimble test
      - run: denim build src/${{ github.event.repository.name }}.nim -r -y --cmake
